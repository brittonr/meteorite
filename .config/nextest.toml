[profile.default]
test-threads = 1
fail-fast = true
slow-timeout = { period = "60s" }

[profile.quick]
test-threads = "num-cpus"
fail-fast = true
slow-timeout = { period = "30s" }
default-filter = "not test(proptest) & not test(chaos) & not test(madsim) & not test(simulation)"

[profile.ci]
test-threads = 1
fail-fast = false
retries = 1
slow-timeout = { period = "120s" }
